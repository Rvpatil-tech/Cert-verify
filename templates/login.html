{% extends "base.html" %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 60px; height: 60px; background: rgba(30, 58, 138, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i class="fa-solid fa-lock" style="font-size: 1.5rem; color: var(--primary-blue);"></i>
            </div>
            <h2 style="color: var(--primary-blue); margin-bottom: 0.5rem;">Admin Access</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Secure dashboard login</p>
        </div>

        {% if error %}
        <div class="alert" style="background: rgba(239, 68, 68, 0.1); color: #EF4444; border-color: #EF4444;">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--silver);"></i>
                    <input type="text" id="username" name="username" class="form-control" style="padding-left: 3rem;" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-key" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--silver);"></i>
                    <input type="password" id="password" name="password" class="form-control" style="padding-left: 3rem;" required>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 1rem;">
                Login to Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
